<style>

  body{min-height:100vh;display:grid;place-items:center;padding:24px;

<script>
(async () => {
  try {
    const sb = window.supabase.createClient(
      'https://bjkozsukvifkxriojxrz.supabase.co',
      'sb_publishable_X2CJWgjqeZtbNelAri9ofw_trbfWF9Z'
    );
    // supabase-js сам ловит токен из #hash и сохраняет сессию (общий localStorage с index.html)
    const { data } = await sb.auth.getSession();
    const user = data.session && data.session.user;
    if (user) {
      document.getElementById('email').textContent = user.email;

    // убираем токен из адресной строки
    if (location.hash) history.replaceState(null, '', location.pathname);
  } catch (e) {}
})();
</script>
